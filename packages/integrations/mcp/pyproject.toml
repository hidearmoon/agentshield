[project]
name = "agentshield-mcp"
version = "0.1.0"
description = "AgentShield guard for MCP (Model Context Protocol) servers"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "mcp>=1.0",
    "agentshield>=0.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
