[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentshield-console"
version = "1.0.0"
description = "AgentShield Management Console — API server for the security dashboard"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.111,<1",
    "uvicorn[standard]>=0.30,<1",
    "sqlalchemy[asyncio]>=2.0,<3",
    "asyncpg>=0.29,<1",
    "clickhouse-connect>=0.7,<1",
    "pydantic-settings>=2.2,<3",
    "python-jose[cryptography]>=3.3,<4",
    "httpx>=0.27,<1",
]

[project.scripts]
agentshield-console = "agentshield_console.app:run"
