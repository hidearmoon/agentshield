[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentguard-proxy"
version = "0.1.0"
description = "AgentGuard Proxy — intercepts AI agent tool calls for security inspection"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115,<1",
    "uvicorn[standard]>=0.32,<1",
    "httpx>=0.27,<1",
    "pydantic-settings>=2.6,<3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "httpx",
]

[tool.hatch.build.targets.wheel]
packages = ["src/agentguard_proxy"]
