[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentshield"
version = "0.1.0"
description = "AgentShield SDK — lightweight security guardrails for AI agents"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.25,<1",
    "pyyaml>=6,<7",
]

[project.optional-dependencies]
langchain = ["langchain-core>=0.1"]
crewai = ["crewai>=0.30"]
autogen = ["pyautogen>=0.2"]
claude = ["claude-agent-sdk>=0.1"]
all = [
    "langchain-core>=0.1",
    "crewai>=0.30",
    "pyautogen>=0.2",
    "claude-agent-sdk>=0.1",
]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
]

[tool.hatch.build.targets.wheel]
packages = ["src/agentshield"]
