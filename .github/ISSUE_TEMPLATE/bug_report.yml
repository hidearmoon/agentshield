name: Bug Report
description: Report a bug in AgentShield
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug. Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Start the core engine with `...`
        2. Send a check request with `...`
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AgentShield Version
      placeholder: "1.0.0"
  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: "3.12"
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Core Engine
        - Python SDK
        - TypeScript SDK
        - Go SDK
        - Proxy
        - Console
        - Integration (OpenClaw/MCP/Dify/AutoGPT/n8n)
        - Other
