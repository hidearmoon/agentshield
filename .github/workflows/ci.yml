name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ matrix.python-version }}
      - run: cd packages/core && uv sync --extra dev
      - run: cd packages/sdk-python && uv sync --extra dev
      - name: Lint
        run: uv run ruff check packages/ --select E,F,W && uv run ruff format --check packages/
      - name: Core tests
        run: cd packages/core && uv run pytest tests/ -v --cov=agentshield_core --cov-fail-under=85
      - name: SDK tests
        run: cd packages/sdk-python && uv run pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd packages/console/frontend && npm ci
      - run: cd packages/console/frontend && npx tsc --noEmit
