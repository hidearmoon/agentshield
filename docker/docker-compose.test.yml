services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: agentguard_test
      POSTGRES_USER: agentguard
      POSTGRES_PASSWORD: test-password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentguard"]
      interval: 2s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8124:8123"
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 2s
      timeout: 5s
      retries: 10
